<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Yori Task</title>
  <style>
    /* 界面字体：优先跟随系统 UI 字体，中文用常见黑体系 fallback */
    :root {
      --text: #2c2419;
      --muted: #6b5f52;
      --bg: #faf8f5;
      --font-ui: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial,
        "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "WenQuanYi Micro Hei", sans-serif;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font-ui);
      font-size: 16px;
      line-height: 1.65;
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
    }
    main {
      max-width: 40rem;
      margin: 0 auto;
      padding: 2rem 1.25rem 3rem;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      margin: 0 0 1.5rem;
    }
    h2 {
      font-size: 1rem;
      font-weight: 500;
      color: var(--muted);
      margin: 0 0 0.75rem;
      line-height: 1.55;
    }
    p {
      margin: 1.25rem 0 0.35rem;
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--text);
    }
    img {
      display: block;
      max-width: 100%;
      height: auto;
      border-radius: 8px;
      box-shadow: 0 4px 24px rgba(44, 36, 25, 0.08);
    }
  </style>
</head>
<body>
  <main>
    <h1>Yori Task</h1>
    <section>
      <h2>感谢支持和鼓励，赞助我以维持后续维护和开发，谢谢</h2>
      <h2>Thank you for your support and encouragement.</h2>
      <h2>Your donation helps me continue maintenance and development.</h2>
      <p>WechatPay</p>
      <img src="images/wechatpay.png" alt="微信收款码" width="250" />
      <p>AliPay</p>
      <img src="images/alipay.png" alt="支付宝收款码" width="250" />
    </section>
  </main>
</body>
</html>
