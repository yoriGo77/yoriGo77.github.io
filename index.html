<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Yori Task</title>
  <style>
    /* 界面字体：优先跟随系统 UI 字体，中文用常见黑体系 fallback */
  :root {
  --text: #99876c;      /* 主文字颜色改为你要的色值 */
  --muted: #99876c;     /* 次级文字也统一这个颜色 */
}
body {
  font-size: 15px;      /* 原来16px，整体字号缩小一点 */
}
h1 {
  font-size: 1.35rem;   /* 原来1.5rem */
  font-weight: 400;     /* 原来600，改细 */
}
h2 {
  font-size: 0.92rem;   /* 原来1rem */
  font-weight: 300;     /* 原来500，改细 */
}
p {
  font-size: 0.88rem;   /* 原来0.95rem */
  font-weight: 400;     /* 原来600，改细 */
}
    img {
      display: block;
      max-width: 100%;
      height: auto;
      border-radius: 8px;
      box-shadow: 0 4px 24px rgba(44, 36, 25, 0.08);
    }
  </style>
</head>
<body>
  <main>
    <h1>Yori Task</h1>
    <section>
      <h2>感谢支持和鼓励，赞助我以维持后续维护和开发，谢谢</h2>
      <h2>Thank you for your support and encouragement.</h2>
      <h2>Your donation helps me continue maintenance and development.</h2>
      <p>WechatPay</p>
      <img src="images/wechatpay.png" alt="微信收款码" width="250" />
      <p>AliPay</p>
      <img src="images/alipay.png" alt="支付宝收款码" width="250" />
    </section>
  </main>
</body>
</html>
